{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width:720px;margin:1.5rem auto;padding:1rem;">
  <div class="card-header">
    <h3>Edit Sale Record</h3>
  </div>
  <form method="post" class="sales-entry-form">
    <input type="hidden" name="record_id" value="{{ record.id }}" />
    <div class="input-group">
      <label class="input-label">Date</label>
      <input name="date" type="date" class="input" value="{{ record.date }}" />
    </div>
    <div class="input-group">
      <label class="input-label">Bread Type</label>
      <select name="bread_type" class="select">
        {% for bread in bread_types %}
          <option value="{{ bread }}" {% if bread == record.bread_type %}selected{% endif %}>{{ bread }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="input-group">
      <label class="input-label">Produced</label>
      <input name="produced" type="number" class="input" value="{{ record.products_produced }}" min="0" />
    </div>
    <div class="input-group">
      <label class="input-label">Sold</label>
      <input name="sold" type="number" class="input" value="{{ record.actual_qty_sold }}" min="0" />
    </div>
    <div class="input-group">
      <label class="input-label">Price</label>
      <input name="price" type="number" step="0.1" class="input" value="{{ record.price_per_product }}" />
    </div>
    <div class="input-group">
      <label class="input-label">Expense Amount (₱)</label>
      <input name="expense_amount" type="number" step="0.01" class="input" value="{{ record.expense_amount }}" min="0" />
    </div>
    <div class="form-controls" style="margin-top:1rem;">
      <button type="submit" class="button button-primary">Save Changes</button>
      <a href="{{ url_for('sales_log') }}" class="button button-secondary" style="margin-left:8px;">Cancel</a>
      <button type="submit" name="action" value="delete_record" class="button button-danger" style="margin-left:8px;" onclick="return confirm('Delete this record? This cannot be undone.')">Delete</button>
    </div>
  </form>
</div>
{% endblock %}
